services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: opendiary
      POSTGRES_PASSWORD: opendiary
      POSTGRES_DB: opendiary
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opendiary"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://opendiary:opendiary@db:5432/opendiary
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      UPLOADS_DIR: /app/uploads
      NODE_ENV: production
      HTTPS: '0'
      BODY_SIZE_LIMIT: '25M'
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
